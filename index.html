<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petite question...</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: black;
            text-align: center;
        }
        .card {
            background: yellow;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        h1 {
            color: #ff4d6d;
            font-size: 1.8rem;
            margin-bottom: 30px;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 50px;
        }
        button {
            font-size: 1.2rem;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }
        #yesBtn {
            background-color: #ff4d6d;
            color: white;
        }
        #yesBtn:hover {
            transform: scale(1.1);
        }
        #noBtn {
            background-color: #e0e0e0;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="question">Veux-tu être ma cavalière pour le bal de fin d'année ? 💃✨</h1>
        
        <div class="buttons">
            <button id="yesBtn">Oui ! 😍</button>
            <button id="noBtn">Non 😢</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const question = document.getElementById('question');

        // Force le bouton "Non" à s'enfuir au survol (et au clic pour le mobile)
        function escape() {
            // Calcule des positions aléatoires sur l'écran
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        noBtn.addEventListener('mouseover', escape);
        noBtn.addEventListener('click', escape);

        // Action quand elle clique sur "Oui"
        yesBtn.addEventListener('click', () => {
            question.innerHTML = "Lééégooo ! On va tout déchirer au bal ! 🥳❤️";
            // Cache les boutons après le clic
            document.querySelector('.buttons').style.display = 'none';
        });
    </script>

</body>
</html>
